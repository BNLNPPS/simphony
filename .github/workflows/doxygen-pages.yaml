name: Doxygen Docs

on:
  push:
    branches:
      - main
    paths:
      - '**/*.h'
      - '**/*.hh'
      - '**/*.hpp'
      - '**/*.hxx'
      - '**/*.c'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.cxx'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.inc'
      - README.md
      - Doxyfile
      - .github/workflows/doxygen-pages.yaml
  pull_request:
    paths:
      - '**/*.h'
      - '**/*.hh'
      - '**/*.hpp'
      - '**/*.hxx'
      - '**/*.c'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.cxx'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.inc'
      - README.md
      - Doxyfile
      - .github/workflows/doxygen-pages.yaml
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Doxygen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Build documentation
        run: doxygen Doxyfile

      - name: Setup Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Add Pages landing file
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: touch _build/doxygen/html/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/doxygen/html

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@v4
