name: Build Pull Request

on:
  pull_request:
    branches:
      - '**'

concurrency:
   group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
   cancel-in-progress: true

jobs:

  cpp-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cpp-linter/cpp-linter-action@main
        id: linter
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: microsoft
          ignore: include/argparse
          lines-changed-only: true
          thread-comments: true
          format-review: true
          tidy-checks: '-*'

      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed != 0
        run: |
          echo "some linter checks failed. ${{ steps.linter.outputs.checks-failed }}"
          exit 1

  build-release-smoke:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include: &build_variants
          - os: ubuntu24.04
            cuda_version: 13.0.2
            optix_version: 9.0.0
            geant4_version: 11.4.1
            cmake_version: 4.2.1
          - os: ubuntu22.04
            cuda_version: 12.1.1
            optix_version: 8.0.0
            geant4_version: 11.3.2
            cmake_version: 3.31.6

    steps:
      - name: Define environment variables
        run: |
          echo IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
          echo IMAGE_TAG=$(echo "PR-${{ github.event.pull_request.number }}-release-cuda-${{ matrix.cuda_version }}-${{ matrix.os }}-optix-${{ matrix.optix_version }}-geant4-${{ matrix.geant4_version }}") >> $GITHUB_ENV
          echo CACHE_SCOPE=build-release-smoke-${{ matrix.os }}-cuda-${{ matrix.cuda_version }}-optix-${{ matrix.optix_version }}-geant4-${{ matrix.geant4_version }} >> $GITHUB_ENV
          echo IS_FORK=${{ github.event.pull_request.head.repo.full_name != github.repository }} >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          target: release
          build-args: &common_build_args |
            OS=${{ matrix.os }}
            CUDA_VERSION=${{ matrix.cuda_version }}
            OPTIX_VERSION=${{ matrix.optix_version }}
            GEANT4_VERSION=${{ matrix.geant4_version }}
            CMAKE_VERSION=${{ matrix.cmake_version }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: ${{ env.IS_FORK == 'false' && format('type=gha,mode=max,scope={0}', env.CACHE_SCOPE) || '' }}

  build-develop-test:
    runs-on: [gpu]

    strategy:
      fail-fast: false
      matrix:
        include: *build_variants

    steps:
      - name: Define environment variables
        run: |
          echo IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
          echo IMAGE_TAG=$(echo "PR-${{ github.event.pull_request.number }}-develop-cuda-${{ matrix.cuda_version }}-${{ matrix.os }}-optix-${{ matrix.optix_version }}-geant4-${{ matrix.geant4_version }}") >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push with Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          target: develop
          build-args: *common_build_args
          load: true
          cache-from: type=local,src=/home/runner/.buildx-cache
          cache-to: type=local,dest=/home/runner/.buildx-cache-new,mode=max

      - name: Move cache
        # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        run: |
          rm -rf /home/runner/.buildx-cache
          mv /home/runner/.buildx-cache-new /home/runner/.buildx-cache

      - name: Run tests
        run: |
          docker run --rm --gpus 'device=1' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} tests/test_opticks.sh
          docker run --rm --gpus 'device=1' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} tests/test_simg4ox.sh
          docker run --rm --gpus 'device=1' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} tests/test_GPURaytrace.sh
          docker run --rm --gpus 'device=1' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} tests/test_GPUPhotonFileSource.sh
          docker run --rm --gpus 'device=1' ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} tests/test_GPUPhotonSource_8x8SiPM.sh

      - name: Cleanup local test image
        if: ${{ success() }}
        run: |
          docker image rm -f ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
